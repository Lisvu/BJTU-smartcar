name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/bjtu_ros2_ws/src/bjtu_comm:${{ github.workspace }}/yahboomcar_ws
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip coverage pytest

      - name: Check Python syntax
        run: |
          python -m compileall -q \
            bjtu_ros2_ws/src/bjtu_comm/bjtu_comm \
            bjtu_ros2_ws/src/bjtu_comm/test/test_messages.py \
            yahboomcar_ws/battery_monitor.py \
            yahboomcar_ws/battery_status.py \
            yahboomcar_ws/test/test_battery_status.py

      - name: Run unit tests with coverage
        run: |
          python -m coverage run \
            --source=bjtu_comm.messages,battery_status \
            -m pytest \
            bjtu_ros2_ws/src/bjtu_comm/test/test_messages.py \
            yahboomcar_ws/test/test_battery_status.py \
            -v
          python -m coverage report --show-missing --fail-under=100
          python -m coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml

  ros2-build-and-test:
    name: ROS2 Foxy build and test
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:foxy-desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build package
        shell: bash
        run: |
          source /opt/ros/foxy/setup.bash
          cd bjtu_ros2_ws
          colcon build \
            --packages-select bjtu_comm \
            --event-handlers console_direct+

      - name: Test package
        shell: bash
        run: |
          source /opt/ros/foxy/setup.bash
          cd bjtu_ros2_ws
          colcon test \
            --packages-select bjtu_comm \
            --event-handlers console_direct+
          colcon test-result --verbose

  package-deployment:
    name: Package Jetson deployment
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [python-checks, ros2-build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Create source deployment package
        shell: bash
        run: |
          mkdir -p dist/smartcar-deployment
          cp -r bjtu_ros2_ws/src/bjtu_comm dist/smartcar-deployment/
          cp -r yahboomcar_ws/smartcar_web dist/smartcar-deployment/
          cp yahboomcar_ws/battery_monitor.py dist/smartcar-deployment/
          cp yahboomcar_ws/battery_status.py dist/smartcar-deployment/
          cp -r ROS2-Foxy/scripts dist/smartcar-deployment/ros2-scripts
          cp README.md dist/smartcar-deployment/
          cp docs/CLOUD_PLATFORM_AND_CICD_PLAN.md dist/smartcar-deployment/
          tar -czf dist/bjtu-smartcar-${GITHUB_SHA}.tar.gz \
            -C dist smartcar-deployment

      - name: Upload deployment package
        uses: actions/upload-artifact@v5
        with:
          name: jetson-deployment-${{ github.sha }}
          path: dist/bjtu-smartcar-${{ github.sha }}.tar.gz
          retention-days: 30

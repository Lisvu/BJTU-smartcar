name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bjtu_ros2_ws/src/bjtu_comm
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Check Python syntax
        run: python -m compileall -q bjtu_comm test/test_messages.py

      - name: Run unit tests
        run: python -m pytest test/test_messages.py -v

  ros2-build-and-test:
    name: ROS2 Foxy build and test
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:foxy-desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build package
        shell: bash
        run: |
          source /opt/ros/foxy/setup.bash
          cd bjtu_ros2_ws
          colcon build \
            --packages-select bjtu_comm \
            --event-handlers console_direct+

      - name: Test package
        shell: bash
        run: |
          source /opt/ros/foxy/setup.bash
          cd bjtu_ros2_ws
          colcon test \
            --packages-select bjtu_comm \
            --event-handlers console_direct+
          colcon test-result --verbose

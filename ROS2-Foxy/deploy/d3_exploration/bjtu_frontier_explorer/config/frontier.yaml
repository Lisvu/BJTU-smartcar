    dry_run: true
    map_topic: /map
    stop_pose_topic: /bjtu/stop_pose_map
    map_frame: map
    base_frame: base_footprint
    navigate_action: /navigate_to_pose
    spin_action: /spin

    recompute_period_s: 2.0
    frontier_connectivity: 8

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BJTU Smart Car Features</title>
  <link rel="stylesheet" href="style.css?v=20260713b" />
</head>
<body data-page="bjtu">
  <nav class="top-nav">
    <a class="brand-link" href="index.html">BJTU Smart Car</a>
    <div class="nav-links">
      <a href="index.html">控制台</a>
      <a href="power.html">电压状态</a>
      <a href="slam.html">SLAM 地图</a>
      <a href="sensors.html">传感器模块</a>
      <a href="bjtu.html">BJTU 功能</a>
    </div>
  </nav>

  <main class="app detail-page bjtu-page">
    <header class="hero control-hero">
      <div>
        <p class="eyebrow">ROS2 Foxy Integration</p>
        <h1>BJTU 功能</h1>
      </div>
      <button id="bjtuRefresh" class="big">刷新</button>
    </header>

    <section class="bjtu-grid">
      <article class="card bjtu-wide">
        <div class="section-head">
          <h2>运行入口</h2>
          <span id="bjtuRoot" class="pill">--</span>
        </div>
        <div id="bjtuFeatures" class="feature-list"></div>
      </article>

      <article class="card">
        <div class="section-head">
          <h2>STOP 位姿</h2>
          <span id="bjtuStopState" class="pill">--</span>
        </div>
        <div class="status-list compact-status">
          <div><span>base</span><strong id="stopPoseBase">--</strong></div>
          <div><span>map</span><strong id="stopPoseMap">--</strong></div>
          <div><span>chatter</span><strong id="bjtuChatter">--</strong></div>
        </div>
      </article>

      <article class="card">
        <div class="section-head">
          <h2>检测 JSON</h2>
          <span id="detectState" class="pill">--</span>
        </div>
        <label>Host <input id="detectHost" value="127.0.0.1"></label>
        <label>Port <input id="detectPort" type="number" value="5002"></label>
        <div class="actions detail-actions">
          <button id="refreshDetection">读取检测帧</button>
        </div>
        <pre id="detectRaw" class="raw-json">--</pre>
      </article>

      <article class="card bjtu-wide">
        <div class="section-head">
          <h2>日志</h2>
          <span id="bjtuLogName" class="pill">未选择</span>
        </div>
        <pre id="bjtuLog" class="raw-json log-box">选择一个功能后显示日志</pre>
      </article>

      <article class="card bjtu-wide">
        <h2>规划中能力</h2>
        <div id="bjtuPlanned" class="planned-list"></div>
      </article>
    </section>
  </main>
  <script src="detail.js?v=20260713b"></script>
</body>
</html>

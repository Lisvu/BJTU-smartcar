<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BJTU Smart Car Console</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">BJTU Smart Car</p>
        <h1>智能小车控制台</h1>
        <p>手动控制、摄像头、SLAM 建图、地图可视化和导航目标点集成面板。</p>
      </div>
      <button id="stopAll" class="danger big">急停</button>
    </header>

    <section class="dashboard">
      <article class="card camera-card">
        <div class="section-head">
          <h2>摄像头</h2>
          <span id="cameraState" class="pill">--</span>
        </div>
        <div class="video-frame">
          <img id="cameraView" src="/api/camera/stream" alt="camera stream" />
        </div>
      </article>

      <article class="card map-card">
        <div class="section-head">
          <h2>SLAM / 导航地图</h2>
          <span id="vizState" class="pill">等待数据</span>
        </div>
        <canvas id="mapCanvas" width="900" height="560"></canvas>
        <div class="map-legend">
          <span><i class="legend robot"></i>小车</span>
          <span><i class="legend scan"></i>雷达</span>
          <span><i class="legend plan"></i>路径</span>
          <span><i class="legend goal"></i>点击地图填入目标点</span>
        </div>
      </article>
    </section>

    <section class="grid">
      <article class="card status-card">
        <h2>实时状态</h2>
        <div class="status-list">
          <div><span>电压</span><strong id="voltage">--</strong></div>
          <div><span>前方距离</span><strong id="frontDistance">--</strong></div>
          <div><span>雷达避障</span><strong id="guardState">--</strong></div>
          <div><span>地图</span><strong id="mapState">--</strong></div>
          <div><span>规划点数</span><strong id="planLen">--</strong></div>
          <div><span>位姿</span><strong id="poseState">--</strong></div>
        </div>
        <p id="warning" class="warning"></p>
      </article>

      <article class="card control-card">
        <h2>手动控制</h2>
        <label>线速度 <input id="linearSpeed" type="range" min="0.03" max="0.35" step="0.01" value="0.12"><span id="linearVal">0.12</span> m/s</label>
        <label>角速度 <input id="angularSpeed" type="range" min="0.1" max="1.2" step="0.05" value="0.45"><span id="angularVal">0.45</span> rad/s</label>
        <div class="pad">
          <button data-move="forward">前进</button>
          <button data-move="left">左转</button>
          <button data-move="stop" class="stop">停止</button>
          <button data-move="right">右转</button>
          <button data-move="backward">后退</button>
        </div>
      </article>

      <article class="card">
        <h2>雷达避障</h2>
        <label class="check"><input id="guardEnabled" type="checkbox" checked> 启用前方避障</label>
        <label>停车距离 <input id="stopDistance" type="number" min="0.15" max="2" step="0.05" value="0.35"> m</label>
        <button id="applyGuard">应用设置</button>
      </article>

      <article class="card">
        <h2>SLAM 建图</h2>
        <div class="actions">
          <button data-start="bringup">启动底盘/雷达</button>
          <button data-start="camera">启动相机</button>
          <button data-start="slam">启动建图</button>
          <button data-start="save_map">保存地图</button>
          <button data-stop="slam">停止建图</button>
        </div>
      </article>

      <article class="card wide">
        <h2>自动导航</h2>
        <div class="actions row">
          <button data-start="nav_dwa">启动 DWA 导航</button>
          <button data-start="nav_teb">启动 TEB 导航</button>
          <button data-stop="nav_dwa">停止 DWA</button>
          <button data-stop="nav_teb">停止 TEB</button>
        </div>
        <div class="goal-box">
          <label>X <input id="goalX" type="number" step="0.05" value="0"></label>
          <label>Y <input id="goalY" type="number" step="0.05" value="0"></label>
          <label>方向 θ <input id="goalTheta" type="number" step="0.1" value="0"></label>
          <button id="sendGoal">发送目标点</button>
        </div>
      </article>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BJTU Smart Car Console</title>
  <link rel="stylesheet" href="style.css?v=20260712f" />
</head>
<body>
  <nav class="top-nav">
    <a class="brand-link" href="index.html">BJTU Smart Car</a>
    <div class="nav-links">
      <a href="index.html">控制台</a>
      <a href="power.html">电压状态</a>
      <a href="slam.html">SLAM 地图</a>
    </div>
  </nav>

  <main class="app control-only-page">
    <header class="hero control-hero">
      <div>
        <p class="eyebrow">Manual Control</p>
        <h1>控制台</h1>
      </div>
      <button id="stopAll" class="danger big">急停</button>
    </header>

    <section class="control-layout">
      <article class="card control-card drive-panel">
        <h2>手动控制</h2>
        <label>线速度 <input id="linearSpeed" type="range" min="0.03" max="0.35" step="0.01" value="0.12"><span id="linearVal">0.12</span> m/s</label>
        <label>角速度 <input id="angularSpeed" type="range" min="0.1" max="1.2" step="0.05" value="0.45"><span id="angularVal">0.45</span> rad/s</label>
        <div class="pad large-pad">
          <button data-move="forward">前进</button>
          <button data-move="left">左转</button>
          <button data-move="strafeLeft">左平移</button>
          <button data-move="stop" class="stop">停止</button>
          <button data-move="strafeRight">右平移</button>
          <button data-move="right">右转</button>
          <button data-move="backward">后退</button>
        </div>
        <p id="warning" class="warning"></p>
      </article>

      <article class="card camera-panel">
        <div class="section-head">
          <h2>摄像头</h2>
          <span id="cameraState" class="pill">--</span>
        </div>
        <div class="video-frame">
          <img id="cameraView" alt="camera stream" />
        </div>
        <div class="actions detail-actions">
          <button data-start="camera">启动相机</button>
        </div>
      </article>

      <article class="card control-side-panel">
        <h2>底盘控制</h2>
        <div class="actions vertical-actions">
          <button data-start="bringup">启动底盘/雷达</button>
          <button data-start="voice_ctrl">启动语音Demo</button>
          <button data-stop="voice_ctrl">停止语音Demo</button>
          <button id="applyGuard">应用避障设置</button>
        </div>
        <div class="status-list compact-status">
          <div><span>底盘</span><strong id="bringupState">--</strong></div>
          <div><span>语音 Demo</span><strong id="voiceState">--</strong></div>
          <div><span>电压</span><strong id="voltage">--</strong></div>
        </div>
        <label class="check"><input id="guardEnabled" type="checkbox" checked> 启用前方避障</label>
        <label>停车距离 <input id="stopDistance" type="number" min="0.15" max="2" step="0.05" value="0.35"> m</label>
      </article>
    </section>
  </main>
  <script src="app.js?v=20260712f"></script>
</body>
</html>
